services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aurum}
      POSTGRES_USER: ${POSTGRES_USER:-aurum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurum_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_VERSION: ${API_VERSION:-0.1.0}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://aurum:aurum_dev_password@postgres:5432/aurum}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        API_URL: ${WEB_SERVER_API_URL:-http://api:8000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
    environment:
      API_URL: ${WEB_SERVER_API_URL:-http://api:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["python", "/workspace/services/worker/main.py"]
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_VERSION: ${API_VERSION:-0.1.0}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://aurum:aurum_dev_password@postgres:5432/aurum}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      MARKET_POLL_SECONDS: ${MARKET_POLL_SECONDS:-30}
      WORKER_CYCLE_SECONDS: ${WORKER_CYCLE_SECONDS:-60}
      MARKET_BACKFILL_LIMIT: ${MARKET_BACKFILL_LIMIT:-500}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp-server:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: ["python", "/workspace/services/mcp-server/main.py"]
    env_file:
      - path: .env
        required: false
    profiles: ["future"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
